name: app_prenotazioni
description: App per gestire prenotazioni Airbnb
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.8 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.4.2
  path: ^1.8.3
  idb_shim: ^2.6.0

  # Data models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.5.0
  sqflite_common: ^2.5.6

  # Form handling
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.0

  # State management
  flutter_riverpod: ^2.6.0

  # Calendar
  table_calendar: ^3.2.0

  # Swipe actions
  flutter_slidable: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mocktail: ^1.0.0
  # CRITICAL: Required for running sqflite tests on desktop/web platforms
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
